<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Rexolution</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="ai-bg"></canvas>

<nav>
  <a class="logo" href="index.html" aria-label="Rexolution home">
    <img src="images/logo.png" alt="Rexolution logo">
    <img src="images/text.png" alt="Rexolution">
  </a>
  <div class="nav-links">
    <a href="solution.html">솔루션</a>
    <a href="about.html">회사 소개</a>
    <a href="contact.html" class="active" aria-current="page">문의 및 위치</a>
  </div>
</nav>

<main>
  <section class="page-hero">
    <div class="page-hero-inner">
      <p class="eyebrow">Let's connect</p>
      <h1>문의 및 위치</h1>
    </div>
  </section>

    <section class="content">

    <div class="contact-grid">

        <!-- 문의하기 -->
        <article class="card">
        <h3>문의하기</h3>

        <p>
            제품 문의, 도입 상담 등 굼금하신 점을 자유롭게 남겨주세요.
        </p>

        <form id="contact-form" class="contact-form">

            <!-- 성 / 이름 -->
            <div class="form-row">
            <input type="text" name="last_name" placeholder="성" required>
            <input type="text" name="first_name" placeholder="이름" required>
            </div>

            <!-- 회사 -->
            <input type="text" name="company" placeholder="회사명">

            <!-- 부서 / 직책 -->
            <div class="form-row">
            <input type="text" name="department" placeholder="부서">
            <input type="text" name="position" placeholder="직책 / 직급">
            </div>

            <!-- 이메일 -->
            <input type="email" name="user_email" placeholder="이메일" required>

            <!-- 휴대전화 -->
            <input
              type="tel"
              name="phone"
              id="phone"
              inputmode="numeric"
              autocomplete="tel"
              maxlength="13"
              placeholder="000-0000-0000"
              pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"
              title="000-0000-0000 형식으로 입력해주세요">

            <!-- 문의 내용 -->
            <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>

            <button type="submit" class="btn contact-submit">문의 보내기</button>

        </form>

        <p id="form-status" style="margin-top:10px; color:#888;"></p>

        </article>


        <!-- 지도 + 정보 -->
        <article class="card">
        <h3>오시는 길</h3>

        <div id="map" style="width:100%; height:400px;"></div>

        <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID"></script>

        <script>
          var map = new naver.maps.Map('map', {
              center: new naver.maps.LatLng(37.456, 127.039), // 좌표 바꿔야 함
              zoom: 17
          });

          var marker = new naver.maps.Marker({
              position: new naver.maps.LatLng(37.456, 127.039),
              map: map
          });
        </script>

        <!-- 정보 -->
        <div style="margin-top:20px; line-height:1.6;">

            <p><strong>주소</strong>
             서울특별시 서초구 매헌로 16 하이브랜드 AI양재허브 1201호</p>

            <p><strong>전화번호</strong>
             010-9048-1583</p>

            <p><strong>이메일</strong>
             hkim@rexolution.ai</p>

        </div>

        </article>

    </div>

    </section>
</main>

<script src="bg.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("DDwANV5nKbdEEBaYm");

const phoneInput = document.getElementById("phone");

function formatPhoneNumber(value) {
  const digits = value.replace(/\D/g, "").slice(0, 11);

  if (digits.length > 7) {
    return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-${digits.slice(7)}`;
  }

  if (digits.length > 3) {
    return `${digits.slice(0, 3)}-${digits.slice(3)}`;
  }

  return digits;
}

if (phoneInput) {
  phoneInput.addEventListener("input", function(e) {
    e.target.value = formatPhoneNumber(e.target.value);
  });
}

document.getElementById("contact-form").addEventListener("submit", function(e) {
  e.preventDefault();

  const status = document.getElementById("form-status");
  status.innerText = "전송 중...";

  emailjs.sendForm(
    "service_2veom7r",
    "template_zu6cym7",
    this
  ).then(() => {
    status.innerText = "문의가 정상적으로 전송되었습니다.";
    this.reset();
  }).catch((err) => {
    console.error(err);
    status.innerText = "전송 실패. 다시 시도해주세요.";
  });
});
</script>
</body>
</html>
