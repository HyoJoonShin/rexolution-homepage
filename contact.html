<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Rexolution</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="ai-bg"></canvas>

<nav>
  <a class="logo" href="index.html" aria-label="Rexolution home">
    <img src="images/logo.png" alt="Rexolution logo">
    <img src="images/text.png" alt="Rexolution">
  </a>
  <div class="nav-links">
    <a href="solution.html">솔루션</a>
    <a href="about.html">회사 소개</a>
    <a href="contact.html" class="active" aria-current="page">문의 및 위치</a>
  </div>
</nav>

<main>
  <section class="page-hero">
    <div class="page-hero-inner">
      <p class="eyebrow">Let's connect</p>
      <h1>문의 및 위치</h1>
      <p>
        Reach out for product inquiries, partnership discussions, or a demo of
        the Rexolution inspection workflow.
      </p>
    </div>
  </section>

    <section class="content">

    <div class="contact-grid">

        <!-- 문의하기 -->
        <article class="card">
        <h3>문의하기</h3>

        <p>
            제품 문의, 도입 상담, 파트너십 관련 문의를 환영합니다.
        </p>

        <form id="contact-form" class="contact-form">

            <!-- 성 / 이름 -->
            <div class="form-row">
            <input type="text" name="last_name" placeholder="성" required>
            <input type="text" name="first_name" placeholder="이름" required>
            </div>

            <!-- 회사 -->
            <input type="text" name="company" placeholder="회사명">

            <!-- 부서 / 직책 -->
            <div class="form-row">
            <input type="text" name="department" placeholder="부서">
            <input type="text" name="position" placeholder="직책 / 직급">
            </div>

            <!-- 이메일 -->
            <input type="email" name="user_email" placeholder="이메일" required>

            <!-- 휴대전화 -->
            <input type="text" name="phone" placeholder="휴대전화">

            <!-- 문의 내용 -->
            <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>

            <button type="submit" class="btn">문의 보내기</button>

        </form>

        <p id="form-status" style="margin-top:10px; color:#888;"></p>

        </article>


        <!-- 지도 + 정보 -->
        <article class="card">
        <h3>오시는 길</h3>

        <iframe 
            src="https://map.naver.com/p/search/%EB%A0%88%EC%A1%B8%EB%A3%A8%EC%85%98?c=17.33,0,0,0,dh"
            width="100%" 
            height="400" 
            style="border:0; border-radius:10px;">
        </iframe>

        <!-- 정보 -->
        <div style="margin-top:20px; line-height:1.6;">

            <p><strong>주소</strong>
             서울특별시 서초구 매헌로 16 하이브랜드 AI양재허브 1201호</p>

            <p><strong>전화번호</strong>
             010-9048-1583</p>

            <p><strong>이메일</strong>
             hjshin@rexolution.ai</p>

        </div>

        </article>

    </div>

    </section>
</main>

<script src="bg.js"></script>
</body>
</html>
