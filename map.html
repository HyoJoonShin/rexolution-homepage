<body>

<canvas id="ai-bg"></canvas>

<nav>
  <a class="logo" href="index.html" aria-label="Rexolution home">
    <img src="images/logo.png" alt="Rexolution logo">
    <img src="images/text.png" alt="Rexolution">

  <div class="nav-links">

<main>
  <section class="page-hero">
    <div class="page-hero-inner">
      <p class="eyebrow">Visit us</p>
      <h1>오시는 길</h1>
    </div>
  </section>

  <section class="content">
    <div class="contact-grid">
      <!-- 지도 + 정보 -->
      <article class="card">
        <h3>오시는 길</h3>

        <div id="map-wrapper" style="position:relative;">
          <div id="map" style="width:100%; height:400px; border-radius:10px;"></div>
        </div>

        <script>
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        const mapEl = document.getElementById('map-wrapper');

        mapEl.addEventListener('mousedown', function(e) {
          isDragging = false;
          startX = e.clientX;
          startY = e.clientY;
        });

        mapEl.addEventListener('mousemove', function(e) {
          const dx = Math.abs(e.clientX - startX);
          const dy = Math.abs(e.clientY - startY);

          if (dx > 5 || dy > 5) {
            isDragging = true;
          }
        });

        mapEl.addEventListener('mouseup', function() {
          if (!isDragging) {
            window.open(
              "https://map.kakao.com/?q=레졸루션",
              "_blank"
            );
          }
        });
        </script>

        <!-- 정보 -->
        <div style="margin-top:20px; line-height:1.6;">
          <p><strong>주소</strong>
           서울특별시 서초구 매헌로 16 하이브랜드 AI양재허브 1201호</p>

          <p><strong>전화번호</strong>
           010-9048-1583</p>

          <p><strong>이메일</strong>
           hkim@rexolution.ai</p>
        </div>
      </article>
    </div>
  </section>
</main>

<script src="bg.js"></script>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5ece0e2fc4eb3ea2672342b4882f16c1&autoload=false"></script>
<script>
kakao.maps.load(function () {
  var container = document.getElementById('map');

  var options = {
      center: new kakao.maps.LatLng(37.462506,127.036929),
      level: 3
  };

  var map = new kakao.maps.Map(container, options);

  var marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(37.462506,127.036929)
  });

  marker.setMap(map);
});
</script>
</body>
</html>
